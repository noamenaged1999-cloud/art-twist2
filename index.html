<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Art Kahoot Game</title>
<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }
.card { background:#222; margin:10px; padding:15px; border-radius:12px; }
button { padding:10px; margin:5px; border-radius:10px; border:none; cursor:pointer; }
img { max-width:300px; border-radius:10px; }
</style>
</head>
<body>

<h1>🎨 ART KAHOOT</h1>

<div id="start">
<input id="name" placeholder="שם שלך"/>
<button onclick="start()">התחל</button>
</div>

<div id="game" style="display:none">

<h2 id="title"></h2>
<h3 id="artist"></h3>
<img id="img"/>
<p id="question"></p>

<div id="answers"></div>

<h2>🏆 ניקוד</h2>
<div id="score"></div>

<button onclick="next()">שאלה הבאה</button>

</div>

<script>

let player = "";
let score = 0;
let round = 0;

const q = [
{
title:"מונה ליזה",
artist:"Leonardo da Vinci",
img:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Mona_Lisa.jpg",
question:"למה הציור הזה כל כך מפורסם?",
answers:["גניבה מהמוזיאון","חיוך מסתורי","כי הוא עתיק","כל התשובות נכונות"],
correct:3
},
{
title:"הצעקה",
artist:"Edvard Munch",
img:"https://upload.wikimedia.org/wikipedia/commons/f/f4/The_Scream.jpg",
question:"מה הדמות מרגישה?",
answers:["שמחה","פחד וחרדה","שעמום","כעס"],
correct:1
},
{
title:"ליל כוכבים",
artist:"Van Gogh",
img:"https://upload.wikimedia.org/wikipedia/commons/e/ea/The_Starry_Night.jpg",
question:"מה מיוחד בציור?",
answers:["כוכבים זזים","שקט פנימי","ים סוער","שחור לבן"],
correct:1
}
];

function start(){
player = document.getElementById("name").value;
document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";
load();
}

function load(){
let r = q[round];
document.getElementById("title").innerText = r.title;
document.getElementById("artist").innerText = r.artist;
document.getElementById("img").src = r.img;
document.getElementById("question").innerText = r.question;

let div = document.getElementById("answers");
div.innerHTML="";

r.answers.forEach((a,i)=>{
div.innerHTML += `<button onclick="pick(${i})">${a}</button>`;
});
}

function pick(i){
if(i === q[round].correct){
score += 10;
alert("נכון! +10 נקודות 🎉");
} else {
alert("טעות ❌");
}
updateScore();
}

function updateScore(){
document.getElementById("score").innerText =
player + ": " + score;
}

function next(){
round++;
if(round >= q.length) {
alert("נגמר המשחק! ניקוד: " + score);
round = 0;
}
load();
}

</script>

</body>
</html>
