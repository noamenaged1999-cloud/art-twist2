<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>Art Twist LIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { font-family: 'Segoe UI', Arial, sans-serif; margin:0; background:#111; color:white; text-align:center; }
.container { padding:20px; max-width: 600px; margin: 0 auto; }
img { max-width:90%; max-height: 300px; border-radius:12px; margin-top:10px; object-fit: contain; }
button { padding:12px 20px; margin:5px; border-radius:8px; border:none; cursor:pointer; font-weight:bold; background:#00adb5; color:white; font-size:16px; }
button:hover { background:#007a80; }
.card { background:#222; padding:15px; margin:10px auto; border-radius:12px; width: 90%; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
input { padding:12px; margin:5px; border-radius:8px; border:1px solid #444; background:#222; color:white; font-size:16px; text-align:center; }
#qrcode { background: white; padding: 10px; display: inline-block; border-radius: 8px; margin-top: 15px; }
.flex-center { display:flex; flex-direction:column; align-items:center; justify-content:center; }
.admin-btn { background: #ff5722; }
.admin-btn:hover { background: #e64a19; }
</style>
</head>
<body>

<div class="container">

<h1>🎨 Art Twist LIVE</h1>

<div id="join">
  <p>הכנס את שמך כדי להצטרף למשחק:</p>
  <input id="name" placeholder="שם שחקן..."/>
  <button onclick="join()">הצטרף למשחק</button>
  
  <hr style="border-color:#333; margin:20px 0;">
  <h3>הזמן חברים למשחק!</h3>
  <p>סרקו את קוד ה-QR כדי להצטרף:</p>
  <div class="flex-center">
    <div id="qrcode"></div>
  </div>
</div>

<div id="game" style="display:none">

<h2 id="title"></h2>
<h3 id="artist" style="color:#aaa;"></h3>
<img id="img" alt="Art"/>

<h3 id="question" style="color:#00adb5; font-size:22px;"></h3>

<div id="answerBox">
  <input id="answer" placeholder="התשובה היצירתית שלך..."/>
  <button onclick="submitAnswer()">שלח תשובה</button>
</div>

<h3>תשובות השחקנים:</h3>
<div id="answers"></div>

<h3>🗳 הצבעה</h3>
<p>לחץ על התשובה שהכי אהבת (אסור להצביע לעצמך!)</p>
<div id="voteBox"></div>

<h2>🏆 טבלת מובילים</h2>
<div id="board"></div>

<br>
<button class="admin-btn" onclick="nextRound()">סיבוב הבא (מנהל) ➔</button>

</div>

</div>

<script>
// הגדרות Firebase זמניות (פומביות לטובת הבדיקה שלך)
const firebaseConfig = {
  databaseURL: "https://art-twist-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// נתוני המשחק
let myName = "";
const rounds = [
 {
  title:"מונה ליזה",
  artist:"לאונרדו דה וינצ'י",
  img:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Mona_Lisa.jpg",
  question:"למה לדעתכם הציור הזה נהיה כל כך מפורסם בעולם?"
 },
 {
  title:"הצעקה",
  artist:"אדוורד מונק",
  img:"https://upload.wikimedia.org/wikipedia/commons/f/f4/The_Scream.jpg",
  question:"מה גרם לדמות בציור לצרוח ככה?"
 },
 {
  title:"הנשיקה",
  artist:"גוסטב קלימט",
  img:"https://upload.wikimedia.org/wikipedia/commons/4/4d/The_Kiss_-_Gustav_Klimt_-_Google_Cultural_Institute.jpg",
  question:"מה באמת קורה בין שתי הדמויות ברגע זה?"
 }
];

// יצירת קוד QR אוטומטי לפי כתובת האתר הנוכחית
new QRCode(document.getElementById("qrcode"), {
    text: window.location.href,
    width: 180,
    height: 180
});

// פונקציית כניסה למשחק
function join(){
 myName = document.getElementById("name").value.trim();
 if(!myName) return alert("אנא הכנס שם תקין");

 // הוספת השחקן לבסיס הנתונים עם 0 נקודות (אם הוא לא קיים)
 db.ref('players/' + myName).transaction((currentScore) => {
    return currentScore === null ? 0 : currentScore;
 });

 document.getElementById("join").style.display="none";
 document.getElementById("game").style.display="block";

 // האזנה לשינויים בזמן אמת מהשרת
 listenToGame();
}

// שליחת תשובה לשרת
function submitAnswer(){
 let text = document.getElementById("answer").value.trim();
 if(!text) return;
 
 db.ref('answers').push({
   name: myName,
   text: text,
   votes: 0
 });
 
 document.getElementById("answer").value = "";
 document.getElementById("answerBox").style.display = "none"; // מסתיר אחרי שליחה שלא ישלחו פעמיים
}

// פונקציית הצבעה
function vote(answerId, answerOwner){
 if(answerOwner === myName) {
    alert("אתה לא יכול להצביע לתשובה של עצמך!");
    return;
 }
 
 // העלאת הניקוד של התשובה
 db.ref('answers/' + answerId + '/votes').transaction(v => (v || 0) + 1);
 // העלאת הניקוד של השחקן שכתב את התשובה הזו
 db.ref('players/' + answerOwner).transaction(s => (s || 0) + 1);
 
 document.getElementById("voteBox").style.display = "none"; // מניעת הצבעה כפולה בסיבוב
}

// מעבר סיבוב (מסתנכרן לכולם)
function nextRound(){
 db.ref('gameStatus/round').transaction(r => {
    let next = (r || 0) + 1;
    if(next >= rounds.length) next = 0;
    return next;
 });
 // איפוס התשובות בשרת לקראת הסיבוב החדש
 db.ref('answers').remove();
}

// האזנה לשינויים בזמן אמת ב-Firebase
function listenToGame() {
  
  // 1. האזנה לסיבוב הנוכחי
  db.ref('gameStatus/round').on('value', snapshot => {
     let roundIndex = snapshot.val() || 0;
     loadRound(roundIndex);
  });

  // 2. האזנה לתשובות ולהצבעות
  db.ref('answers').on('value', snapshot => {
     let answersData = snapshot.val() || {};
     renderAnswers(answersData);
  });

  // 3. האזנה לטבלת המובילים
  db.ref('players').on('value', snapshot => {
     let playersData = snapshot.val() || {};
     renderLeaderboard(playersData);
  });
}

// טעינת פרטי הסיבוב על המסך
function loadRound(roundIndex){
 let r = rounds[roundIndex];
 document.getElementById("title").innerText = r.title;
 document.getElementById("artist").innerText = r.artist;
 document.getElementById("img").src = r.img;
 document.getElementById("question").innerText = r.question;
 
 // החזרת תיבת הטקסט וההצבעות לפעילות בסיבוב חדש
 document.getElementById("answerBox").style.display = "block";
 document.getElementById("voteBox").style.display = "block";
}

// רינדור התשובות וההצבעות בזמן אמת
function renderAnswers(answersData) {
 let aDiv = document.getElementById("answers");
 let vDiv = document.getElementById("voteBox");
 
 aDiv.innerHTML = "";
 vDiv.innerHTML = "";

 Object.keys(answersData).forEach(id => {
    let a = answersData[id];
    aDiv.innerHTML += `<div class='card'><strong>${a.name}:</strong> ${a.text} (${a.votes} הצבעות)</div>`;
    vDiv.innerHTML += `<button onclick="vote('${id}', '${a.name}')">הצבע ל: "${a.text}"</button>`;
 });
}

// רינדור טבלת הניקוד
function renderLeaderboard(playersData) {
 let bDiv = document.getElementById("board");
 bDiv.innerHTML = "";
 
 // הפיכה למערך ומיון מהגבוה לנמוך
 let sorted = Object.keys(playersData).map(name => ({name: name, score: playersData[name]}))
                    .sort((a,b) => b.score - a.score);

 sorted.forEach(p => {
    bDiv.innerHTML += `<div style="font-size:18px; margin:5px;">🥇 <strong>${p.name}</strong>: ${p.score} נקודות</div>`;
 });
}
</script>

</body>
</html>
