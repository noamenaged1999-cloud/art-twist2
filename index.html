<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>Art Twist LIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { font-family: 'Segoe UI', Arial, sans-serif; margin:0; background:#111; color:white; text-align:center; }
.container { padding:20px; max-width: 600px; margin: 0 auto; }
img { max-width:90%; max-height: 280px; border-radius:12px; margin-top:10px; object-fit: contain; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
button { padding:12px 20px; margin:5px; border-radius:8px; border:none; cursor:pointer; font-weight:bold; background:#00adb5; color:white; font-size:16px; }
button:hover { background:#007a80; }
.card { background:#222; padding:15px; margin:10px auto; border-radius:12px; width: 90%; box-shadow: 0 4px 6px rgba(0,0,0,0.3); font-size: 18px; }
input { padding:12px; margin:5px; border-radius:8px; border:1px solid #444; background:#222; color:white; font-size:16px; text-align:center; width: 80%; }
#qrcode { background: white; padding: 10px; display: inline-block; border-radius: 8px; margin-top: 15px; }
.flex-center { display:flex; flex-direction:column; align-items:center; justify-content:center; }
.admin-panel { background: #222; border: 2px dashed #ff5722; padding: 15px; margin-top: 30px; border-radius: 12px; }
.admin-btn { background: #ff5722; }
.admin-btn:hover { background: #e64a19; }
.status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; background: #333; font-weight: bold; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="container">

<h1>🎨 Art Twist LIVE</h1>

<div id="join">
  <p>הכנס את שמך כדי להצטרף למשחק:</p>
  <input id="name" placeholder="שם שחקן..."/>
  <br>
  <button onclick="join()">הצטרף למשחק</button>
  
  <hr style="border-color:#333; margin:20px 0;">
  <h3>הזמנת שחקנים</h3>
  <p>סרקו את הקוד כדי להצטרף מהטלפון:</p>
  <div class="flex-center">
    <div id="qrcode"></div>
  </div>
</div>

<div id="game" style="display:none">

  <div id="statusBadge" class="status-badge">טוען מצב...</div>
  
  <h2 id="title"></h2>
  <h3 id="artist" style="color:#aaa; font-weight: normal; margin-top:-10px;"></h3>
  <img id="img" alt="Art"/>

  <h3 id="question" style="color:#00adb5; font-size:22px; margin: 15px 0;"></h3>

  <div id="writeStage" style="display:none;">
    <div id="answerBox">
      <input id="answer" placeholder="התשובה המצחיקה/יצירתית שלך..."/>
      <br>
      <button onclick="submitAnswer()">שלח תשובה חסויה 🔒</button>
    </div>
    <div id="waitMessage" style="display:none;" class="card">
      תשובתך נשמרה בסוד! מחכים ששאר השחקנים יסיימו לכתוב... ⏳
    </div>
  </div>

  <div id="voteStage" style="display:none;">
    <h3>🗳 הזמן להצביע!</h3>
    <p>לחצו על התשובה שהכי אהבתם (אסור להצביע לעצמכם):</p>
    <div id="voteBox"></div>
  </div>

  <div id="resultsStage" style="display:none;">
    <h3>📊 תוצאות הסיבוב:</h3>
    <div id="answersResults"></div>
  </div>

  <hr style="border-color:#333; margin:20px 0;">
  <h2>🏆 טבלת מובילים כללית</h2>
  <div id="board"></div>

  <div class="admin-panel">
    <p style="color:#ff5722; margin-top:0; font-weight:bold;">🎛 שלטי ניהול משחק:</p>
    <button class="admin-btn" onclick="setStage('vote')">1. חשוף תשובות ועבור להצבעה 🗳</button>
    <button class="admin-btn" onclick="setStage('results')">2. חשוף שמות ותוצאות סיבוב 📊</button>
    <button class="admin-btn" style="background:#4caf50;" onclick="nextRound()">3. עבר לסיבוב הבא ➔</button>
  </div>

</div>

</div>

<script>
const firebaseConfig = { databaseURL: "https://art-twist-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName = "";
let hasAnswered = false;

const rounds = [
 { title:"מונה ליזה", artist:"לאונרדו דה וינצ'י", img:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Mona_Lisa.jpg", question:"למה לדעתכם הציור הזה נהיה כל כך מפורסם בעולם?" },
 { title:"הצעקה", artist:"אדוורד מונק", img:"https://upload.wikimedia.org/wikipedia/commons/f/f4/The_Scream.jpg", question:"מה גרם לדמות בציור לצרוח ככה?" },
 { title:"הנשיקה", artist:"גוסטב קלימט", img:"https://upload.wikimedia.org/wikipedia/commons/4/4d/The_Kiss_-_Gustav_Klimt_-_Google_Cultural_Institute.jpg", question:"מה באמת קורה בין שתי הדמויות ברגע זה?" }
];

new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 160, height: 160 });

function join(){
 myName = document.getElementById("name").value.trim();
 if(!myName) return alert("אנא הכנס שם תקין");

 db.ref('players/' + myName).transaction((score) => score === null ? 0 : score);
 document.getElementById("join").style.display="none";
 document.getElementById("game").style.display="block";

 listenToGame();
}

function submitAnswer(){
 let text = document.getElementById("answer").value.trim();
 if(!text) return;
 
 db.ref('answers').push({ name: myName, text: text, votes: 0 });
 hasAnswered = true;
 document.getElementById("answerBox").style.display = "none";
 document.getElementById("waitMessage").style.display = "block";
}

function vote(answerId, answerOwner){
 if(answerOwner === myName) return alert("אסור להצביע לעצמך!");
 
 db.ref('answers/' + answerId + '/votes').transaction(v => (v || 0) + 1);
 db.ref('players/' + answerOwner).transaction(s => (s || 0) + 1);
 
 document.getElementById("voteBox").innerHTML = "<div class='card'>הצבעתך התקבלה! ממתינים לתוצאות... 🗳️</div>";
}

// פונקציות ניהול שלבים
function setStage(stageName) {
  db.ref('gameStatus/stage').set(stageName);
}

function nextRound(){
 db.ref('gameStatus/round').transaction(r => ((r || 0) + 1) % rounds.length);
 db.ref('answers').remove();
 db.ref('gameStatus/stage').set('write');
}

function listenToGame() {
  // האזנה לסיבוב
  db.ref('gameStatus/round').on('value', snap => {
     let rIdx = snap.val() || 0;
     let r = rounds[rIdx];
     document.getElementById("title").innerText = r.title;
     document.getElementById("artist").innerText = r.artist;
     document.getElementById("img").src = r.img;
     document.getElementById("question").innerText = r.question;
     
     // איפוס הגדרות מקומיות בסיבוב חדש
     if(!hasAnswered) {
        document.getElementById("answer").value = "";
        document.getElementById("answerBox").style.display = "block";
        document.getElementById("waitMessage").style.display = "none";
     }
  });

  // האזנה לשלבי המשחק ועדכון המסך בזמן אמת לכולם
  db.ref('gameStatus/stage').on('value', snap => {
     let stage = snap.val() || 'write';
     
     document.getElementById("writeStage").style.display = "none";
     document.getElementById("voteStage").style.display = "none";
     document.getElementById("resultsStage").style.display = "none";

     if(stage === 'write') {
        document.getElementById("statusBadge").innerText = "✍️ שלב הכתיבה";
        document.getElementById("writeStage").style.display = "block";
        hasAnswered = false;
     } 
     else if(stage === 'vote') {
        document.getElementById("statusBadge").innerText = "🗳️ שלב ההצבעה";
        document.getElementById("voteStage").style.display = "block";
        fetchAnswersForVoting();
     } 
     else if(stage === 'results') {
        document.getElementById("statusBadge").innerText = "📊 תוצאות הסיבוב";
        document.getElementById("resultsStage").style.display = "block";
        fetchAnswersForResults();
     }
  });

  // האזנה לטבלה הכללית
  db.ref('players').on('value', snap => {
     let pData = snap.val() || {};
     let bDiv = document.getElementById("board");
     bDiv.innerHTML = "";
     Object.keys(pData).map(n => ({name:n, score:pData[n]}))
        .sort((a,b) => b.score - a.score)
        .forEach(p => bDiv.innerHTML += `<div>🥇 <strong>${p.name}</strong>: ${p.score}pt</div>`);
  });
}

function fetchAnswersForVoting() {
  db.ref('answers').once('value', snap => {
    let answers = snap.val() || {};
    let vBox = document.getElementById("voteBox");
    vBox.innerHTML = "";
    Object.keys(answers).forEach(id => {
      let a = answers[id];
      // מציג רק את הטקסט בלי השם (כדי שלא ידעו של מי התשובה!)
      vBox.innerHTML += `<button onclick="vote('${id}', '${a.name}')">הצבע ל: "${a.text}"</button><br>`;
    });
  });
}

function fetchAnswersForResults() {
  db.ref('answers').once('value', snap => {
    let answers = snap.val() || {};
    let resBox = document.getElementById("answersResults");
    resBox.innerHTML = "";
    Object.keys(answers).forEach(id => {
      let a = answers[id];
      // כאן חושפים את השם ואת מספר ההצבעות שקיבל
      resBox.innerHTML += `<div class='card'><strong>${a.name}</strong> רשם: "${a.text}" ➔ 🗳️ <strong>${a.votes}</strong> הצבעות</div>`;
    });
  });
}
</script>
</body>
</html>
